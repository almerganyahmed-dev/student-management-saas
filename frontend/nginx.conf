server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json;

    # SPA routing — unknown paths fall back to index.html so react-router
    # handles them client-side instead of nginx 404ing on e.g. /students.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
